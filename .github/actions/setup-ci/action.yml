name: Setup CI
description: Standard Node setup and optional lint/build for this repo
inputs:
  run-lint:
    description: Whether to run npm run lint
    required: false
    default: 'false'
  run-build:
    description: Whether to run npm run build
    required: false
    default: 'false'
runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
    - run: npm ci
      shell: bash
    - if: ${{ inputs.run-lint == 'true' }}
      run: npm run lint
      shell: bash
    - if: ${{ inputs.run-build == 'true' }}
      run: npm run build
      shell: bash
