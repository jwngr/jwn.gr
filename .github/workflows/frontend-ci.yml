name: Run frontend CI on push

on:
  push:
    paths:
      - 'src/**'
      - 'public/**'
      - '.firebaserc'
      - '.prettierignore'
      - '.prettierrc'
      - 'astro.config.mjs'
      - 'eslint.config.mjs'
      - 'firebase.json'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.github/actions/setup-ci/action.yml'
      - '.github/workflows/frontend-ci.yml'

permissions:
  contents: read

# Cancel in-progress runs to save CI minutes.
concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup CI
        uses: ./.github/actions/setup-ci
        with:
          run-lint: 'true'
          run-build: 'true'
