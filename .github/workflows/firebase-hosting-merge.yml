name: Deploy prod website on merge

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/**'
      - '.firebaserc'
      - '.prettierignore'
      - '.prettierrc'
      - 'astro.config.mjs'
      - 'eslint.config.mjs'
      - 'firebase.json'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.github/actions/setup-ci/action.yml'
      - '.github/workflows/firebase-hosting-merge.yml'

permissions:
  contents: read

# Ensure every prod deploy completes. New pushes queue instead of cancelling in-flight deploys.
concurrency:
  group: firebase-hosting-merge-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy_hosting_prod:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup CI
        uses: ./.github/actions/setup-ci
        with:
          run-build: 'true'
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JWNGR_5CB4B }}
          channelId: live
          projectId: jwngr-5cb4b
