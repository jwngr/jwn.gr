name: Deploy prod website on merge

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/**'
      - '.firebaserc'
      - '.prettierignore'
      - '.prettierrc'
      - 'astro.config.mjs'
      - 'eslint.config.mjs'
      - 'firebase.json'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.github/workflows/firebase-hosting-merge.yml'

permissions:
  contents: read

concurrency:
  group: firebase-hosting-merge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/reusable-node-ci.yml
    with:
      node-version: '24'
      run-build: true
  deploy_hosting_prod:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JWNGR_5CB4B }}
          channelId: live
          projectId: jwngr-5cb4b
