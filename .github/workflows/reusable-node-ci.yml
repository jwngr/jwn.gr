name: Reusable Node CI

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        required: false
        default: '24'
      run-lint:
        type: boolean
        required: false
        default: false
      run-build:
        type: boolean
        required: false
        default: false

jobs:
  node-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
      - run: npm ci
      - if: ${{ inputs.run-lint }}
        run: npm run lint
      - if: ${{ inputs.run-build }}
        run: npm run build
